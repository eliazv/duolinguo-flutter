name: duolingo
description: Clone Duolingo GUI and mock backend - Midterm

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  cupertino_icons: ^1.0.2
  google_sign_in: ^7.2.0
  percent_indicator: ^4.0.0
  contained_tab_bar_view: ^0.8.0
  flutter_custom_dialog: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
